<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家庭食谱</title>
<meta name="theme-color" content="#78d6cf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家庭食谱">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="site.webmanifest">
<link rel="stylesheet" href="style.css?v=22f">
</head>
<body>
<section class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="icon-192.png" alt="家庭食谱图标" class="auth-logo">
      <div>
        <h1>家庭食谱</h1>
        <p>家庭菜单、备菜清单、购物车同步</p><div class="login-version">v22 分类修复版</div>
      </div>
    </div>
    <form id="loginForm" class="auth-form">
      <label><span>账号 / 邮箱</span><input id="loginEmail" type="email" autocomplete="username" inputmode="email" required placeholder="例如：family1@example.com"></label>
      <label><span>密码</span><input id="loginPassword" type="password" autocomplete="current-password" required placeholder="请输入密码"></label>
      <button class="btn" id="loginBtn" type="submit">登录</button>
      <div class="auth-msg" id="loginMsg"></div>
    </form>
    <div class="auth-foot">iPhone 上可在 Safari 中点“分享”→“添加到主屏幕”，图标会使用家庭食谱 App 图标。</div>
  </div>
</section>

<main class="app" id="appMain" hidden>
  <header class="app-header">
    <div>
      <div class="app-kicker">共享家庭菜单 · v22</div>
      <h1>家庭食谱</h1>
      <p>菜谱、备菜与购物清单</p>
    </div>
    <div class="top-actions">
      <span class="pill sync" id="syncStatus">未登录</span>
      <span class="pill sync email-pill" id="accountEmail"></span>
      <button class="pill danger" id="logoutBtn">退出</button>
    </div>
  </header>

  <section class="hero directory-hero" id="directoryHero">
    <div class="hero-copy">
      <h2 id="heroTitle">家里常备食材，一眼看清</h2>
      <p id="heroText">管理牛奶、鸡蛋、水果等常用食材，需要补货时直接进购物车。</p>
    </div>
    <div class="hero-picture" id="heroPicture"></div>
  </section>

  <section class="toolbar">
    <div class="search"><span>🔎</span><input id="searchInput" placeholder="搜索菜谱、食材..."></div>
    <nav class="tabs" aria-label="主导航">
      <button class="tab active" data-tab="fridge">冰箱</button>
      <button class="tab" data-tab="cart">购物车</button>
      <button class="tab" data-tab="recipes">菜谱</button>
      <button class="tab" data-tab="prep">备菜</button>
    </nav>
    <button class="pill primary add-btn" id="addRecipeBtn" hidden>＋ 菜谱</button>
  </section>

  <section id="recipes" class="view">
    <div class="head"><h2>菜谱</h2><small id="recipeCount"></small></div>
    <div class="recipe-subtabs" id="recipeSubtabs">
      <button class="subtab active" data-recipe-type="全部">全部</button>
      <button class="subtab" data-recipe-type="热菜">热菜</button>
      <button class="subtab" data-recipe-type="凉菜">凉菜</button>
      <button class="subtab" data-recipe-type="其他">其他</button>
    </div>
    <div id="recipeGrid" class="recipe-list"></div>
  </section>

  <section id="prep" class="view">
    <div class="head"><h2>备菜区域</h2><small>点食材前的 X 表示缺少，会同步到购物车</small></div>
    <div id="prepDetail"></div>
  </section>

  <section id="cart" class="view">
    <div class="head"><h2>购物车</h2><small>同名食材会自动合并统计</small></div>
    <div class="panel cart-manual-panel">
      <h3 style="margin-top:0">手动添加采购物品</h3>
      <div class="cart-manual-grid">
        <label><span>物品名称</span><input id="manualCartName" placeholder="例如：盐"></label>
        <label><span>数量</span><input id="manualCartQty" type="number" min="0" step="0.1" placeholder="1"></label>
        <label><span>单位</span><input id="manualCartUnit" placeholder="包 / 个 / g"></label>
        <button class="btn" onclick="addManualCartItem()">添加</button>
      </div>
    </div>
    <div class="panel cart-action-panel">
      <button class="btn yellow" onclick="shareShoppingList()">发送待采购清单</button>
      <button class="btn" onclick="transferCartToFridge()">转冰箱</button>
    </div>
    <div class="summarygrid">
      <div class="summary"><b id="cartNeedCount">0</b><span class="small">合并后待采购</span></div>
      <div class="summary"><b id="cartRawCount">0</b><span class="small">原始待采购项</span></div>
    </div>
    <div id="cartList" class="list" style="margin-top:16px"></div>
  </section>

  <section id="fridge" class="view active">
    <div class="head"><h2>冰箱</h2><small>常用食材，点 X 加入购物车</small></div>
    <div class="fridge-subtabs" id="fridgeSubtabs">
      <button class="fridge-subtab active" data-fridge-category="全部">全部</button>
      <button class="fridge-subtab" data-fridge-category="肉蛋奶">肉蛋奶</button>
      <button class="fridge-subtab" data-fridge-category="蔬果">蔬果</button>
      <button class="fridge-subtab" data-fridge-category="干粮">干粮</button>
      <button class="fridge-subtab" data-fridge-category="零食">零食</button>
    </div>
    <div class="panel"><div class="fridge-add">
      <label><span>新增常用食材</span><input id="fridgeNameField" placeholder="例如：牛奶"></label>
      <label><span>分类</span><select id="fridgeCategoryField">
        <option value="肉蛋奶">肉蛋奶</option>
        <option value="蔬果">蔬果</option>
        <option value="干粮">干粮</option>
        <option value="零食">零食</option>
      </select></label>
      <button class="btn" onclick="addFridgeItem()">添加</button>
    </div></div>
    <div id="fridgeList" class="list"></div>
  </section>
</main>

<dialog id="recipeDialog">
  <form method="dialog" class="dialog-body" id="recipeForm">
    <div class="dialog-head"><h3 id="dialogTitle">添加菜谱</h3><button class="close" type="button" id="closeDialog">×</button></div>
    <div class="formgrid">
      <label><span>菜名</span><input id="nameField" required placeholder="例如：番茄牛腩"></label>
      <label><span>分类</span><select id="categoryField" required>
        <option value="热菜">热菜</option>
        <option value="凉菜">凉菜</option>
        <option value="其他">其他</option>
      </select></label>
      <label><span>人数</span><input id="servingsField" placeholder="3-4人"></label>
      <label><span>耗时</span><input id="timeField" placeholder="45分钟"></label>
      <label class="wide"><span>用料：每行一个，格式：食材 | 需要数量 | 单位</span><textarea id="ingredientsField" required placeholder="番茄 | 3 | 个
牛腩 | 500 | g
土豆 | 2 | 个"></textarea></label>
      <label class="wide"><span>做法</span><textarea id="stepsField" placeholder="1. 准备食材。
2. 烹饪。
3. 装盘。"></textarea></label>
    </div>
    <div class="actions" style="margin-top:14px"><button class="btn yellow" type="button" id="cancelBtn">取消</button><button class="btn" type="submit">保存</button></div>
  </form>
</dialog>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=22f"></script>
<script src="app.js?v=22f"></script>
</body>
</html>
